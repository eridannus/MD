<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Visualizador</title>
<style>
/* ======== Estilos básicos de UI ======== */
:root{--bg:#0a0f1a;--fg:#e6f2ff;--panel:#0f1726;--border:#22304a}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--fg)}
header{position:fixed;inset:0 0 auto 0;padding:.6rem .8rem;display:flex;flex-wrap:wrap;gap:.5rem 1rem;align-items:center;background:linear-gradient(#0a0f1acc,#0a0f1a00);z-index:10}
header>*{font-size:14px}
button,select,input[type="range"],input[type="file"]{background:#111a2b;color:var(--fg);border:1px solid var(--border);border-radius:10px;padding:.45rem .6rem}
button{cursor:pointer}
.spacer{flex:1}
.only-sprites{display:none}
body.sprites .only-sprites{display:inline-block}
#canvas{display:block;width:100vw;height:100vh}
footer{position:fixed;inset:auto 0 0 0;text-align:center;padding:.35rem;font-size:12px;color:#9bb2d3;background:linear-gradient(#0a0f1a00,#0a0f1acc)}

/* ===== Mini reproductor flotante ===== */
#miniPlayer{position:fixed;right:14px;bottom:14px;width:300px;max-width:88vw;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 24px rgba(0,0,0,.35);z-index:20;display:none}
#miniHeader{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-bottom:1px solid var(--border);cursor:move;user-select:none;border-top-left-radius:12px;border-top-right-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0))}
#cover{width:42px;height:42px;border-radius:8px;object-fit:cover;background:#18233a;border:1px solid var(--border)}
#title{font-size:13px;line-height:1.2}
#artist{font-size:12px;opacity:.7}
#miniBody{padding:.6rem}
.row{display:flex;align-items:center;gap:.5rem}
.btn{border-radius:10px;padding:.4rem .6rem}
#progress{width:100%}
.time{font-variant-numeric:tabular-nums;font-size:12px;opacity:.8}
#volume{width:90px}
#minToggle{margin-left:auto}
#miniPlayer.minimized #miniBody{display:none}
#miniPlayer.minimized{width:auto}
</style>
</head>
<body>
<header>
  <!-- Botón de micrófono -->
  <button id="micToggle">🎙️ Mic: OFF</button>
  <!-- Monitor opcional -->
  <label style="display:inline-flex;align-items:center;gap:.4rem">
    <input id="micMonitor" type="checkbox"> Monitorear mic
  </label>

  <!-- Selector de modo visual -->
  <label>Modo
    <select id="mode">
      <option value="bars">Barras</option>
      <option value="ring">Anillo</option>
      <option value="sprites">Sprites</option>
    </select>
  </label>

  <!-- Sliders básicos accesibles (los internos más finos están en CONFIG) -->
  <label>Sensibilidad <input id="gain" type="range" min="0.5" max="5" step="0.1" value="1.6"></label>
  <label>Suavizado <input id="smooth" type="range" min="0" max="0.95" step="0.01" value="0.7"></label>

  <span class="spacer"></span>

  <!-- Cargar archivo de audio para reproducir -->
  <label>Sube audio <input id="fileAudio" type="file" accept="audio/*"></label>

  <!-- Controles específicos de Sprites -->
  <label class="only-sprites">Sprites (PNG) <input id="fileSprites" type="file" accept="image/png" multiple></label>
  <label class="only-sprites">Densidad <input id="density" type="range" min="4" max="30" step="1" value="12"></label>
  <label class="only-sprites">Escala máx <input id="maxScale" type="range" min="1" max="8" step="0.5" value="4"></label>
  <label class="only-sprites">Patrón
    <select id="pattern">
      <option value="grid">Rejilla</option>
      <option value="ring">Anillo</option>
      <option value="wave">Olas</option>
    </select>
  </label>
</header>

<canvas id="canvas"></canvas>
<footer>Visualizador • Juega cambiando valores en la sección “CONFIGURACIÓN PARA ALUMNOS” dentro del código.</footer>

<!-- Mini reproductor flotante -->
<div id="miniPlayer" aria-live="polite">
  <div id="miniHeader">
    <img id="cover" alt="">
    <div style="min-width:0">
      <div id="title">Sin pista</div>
      <div id="artist">—</div>
    </div>
    <button id="minToggle" class="btn" title="Minimizar/expandir">▾</button>
  </div>
  <div id="miniBody">
    <div class="row" style="gap:.6rem">
      <button id="play" class="btn" title="Play/Pause">⏵</button>
      <span class="time" id="cur">0:00</span>
      <input id="progress" type="range" min="0" max="1000" value="0">
      <span class="time" id="dur">0:00</span>
    </div>
    <div class="row" style="margin-top:.5rem">
      <span style="font-size:13px;opacity:.8">Vol</span>
      <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
      <div class="spacer"></div>
      <button id="mute" class="btn" title="Silencio">🔇</button>
    </div>
  </div>
</div>

<script>
(() => {
/* =====================================================================================
   === CONFIGURACIÓN PARA ALUMNOS =====================================================
   Cambien estos valores y recarguen la página para ver el efecto.
   No necesitan programar: sólo números/colores. Las líneas tienen comentarios cortos.
=====================================================================================*/
const CONFIG = {
  // --- Colores globales ---
  BACKGROUND_COLOR: '#0a0f1a',      // Color de fondo del lienzo
  USE_GRADIENT_BG: true,            // true: fondo con rastro transparente
  TRAIL_ALPHA: 0.22,                // 0–1: intensidad del rastro (más alto = más "estela")

  // --- Paleta de elementos reactivos (barras/anillo) ---
  HUE_BASE: 200,                    // 0–360: tono de color base
  HUE_SPREAD: 0.8,                  // cuánto cambia el tono entre barras/segmentos
  SAT_NORMAL: 85,                   // saturación (%) normal
  LIGHT_NORMAL: 60,                 // luminosidad (%) normal
  SAT_BEAT: 95,                     // saturación (%) cuando hay beat
  LIGHT_BEAT: 70,                   // luminosidad (%) cuando hay beat

  // --- Frecuencia/Resolución ---
  BINS: 64,                         // cuántas bandas se dibujan (barras/anillo). Recomendado: 32–96
  FFT_SIZE: 2048,                   // tamaño FFT interno (mientras mayor, más detalle y latencia)

  // --- Sensibilidad base y suavizado (también hay sliders en la UI) ---
  DEFAULT_GAIN: 1.6,                // multiplicador de amplitud (sensibilidad)
  DEFAULT_SMOOTH: 0.7,              // 0–0.95: suavizado temporal de la señal (más alto = más inercia)

  // --- Beat detector ---
  BEAT_HISTORY_FRAMES: 60,          // cuántos frames se usan para el promedio (~1s a 60fps)
  BEAT_FACTOR: 1.35,                // >1: umbral = promedio * BEAT_FACTOR + OFFSET
  BEAT_OFFSET: 0.02,                // ajusta disparo de beat (si hay muchos falsos positivos, sube)
  BEAT_BASS_BANDS: 8,               // cuántas bandas bajas cuentan como "bajos" (1–12 aprox)

  // --- Barras (modo 'bars') ---
  BARS_GAP_PX: 2,                   // separación entre barras (px)
  BARS_TOP_HIGHLIGHT: true,         // lucecita en la punta de cada barra

  // --- Anillo (modo 'ring') ---
  RING_BASE_RATIO: 0.25,            // radio base = min(W,H) * este número
  RING_MAX_EXTRA: 0.35,             // cuánto puede crecer el radio con la música
  RING_LINE_MIN: 3,                 // grosor mínimo del trazo
  RING_LINE_MAX: 11,                // grosor máximo del trazo con la música
  RING_BEAT_FLASH: true,            // flash radial al detectar beat
  RING_FLASH_STRENGTH: 0.18,        // opacidad del flash

  // --- Sprites (modo 'sprites') ---
  SPRITES_COLUMNS: 12,              // columnas base; las filas se calculan por aspecto
  SPRITES_TAKE_BANDS: 16,           // cuántas "macrobandas" se usan para sprites
  SPRITES_MAX_SCALE: 4,             // escala máxima de crecimiento
  SPRITES_PATTERN: 'grid',          // 'grid' | 'ring' | 'wave'
  SPRITES_WAVE_SPEED: 3,            // velocidad de la onda (más alto = más rápido)

  // --- “Velocidad” visual (afecta animaciones dependientes de tiempo) ---
  SPEED_MULT: 1.0                   // 0.5 = lento, 2.0 = más rápido
};
/* ============================ FIN CONFIGURACIÓN ALUMNOS ============================ */

  // ======== Cache de elementos DOM y contexto de canvas ========
  const canvas = document.getElementById('canvas');
  const g = canvas.getContext('2d',{alpha:false});

  const micToggle   = document.getElementById('micToggle');
  const micMonitor  = document.getElementById('micMonitor');
  const modeSel     = document.getElementById('mode');
  const gainCtl     = document.getElementById('gain');
  const smoothCtl   = document.getElementById('smooth');
  const fileAudio   = document.getElementById('fileAudio');

  const fileSprites = document.getElementById('fileSprites');
  const densityCtl  = document.getElementById('density');
  const maxScaleCtl = document.getElementById('maxScale');
  const patternSel  = document.getElementById('pattern');

  // Mostrar controles de sprites sólo si el modo es "sprites"
  function toggleSpritesUI(){ document.body.classList.toggle('sprites', modeSel.value==='sprites'); }
  modeSel.addEventListener('change', toggleSpritesUI); toggleSpritesUI();

  // Ajusta tamaño del canvas al tamaño de la ventana, con soporte HiDPI
  function resize(){
    const dpr=Math.max(1,Math.min(2,devicePixelRatio||1));
    canvas.width=Math.floor(canvas.clientWidth*dpr);
    canvas.height=Math.floor(canvas.clientHeight*dpr);
    g.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener('resize',resize,{passive:true}); new ResizeObserver(resize).observe(document.body); resize();

  // ======== Audio (Web Audio) ========
  let ac, analyser, dataArray, rafId;
  // Buses/Gains
  let masterGain, analysisMix, fileGain, micGain, micMonitorGain;
  // Fuentes
  let audioEl=null, fileSrc=null, micSrc=null, micStream=null, micActive=false;

  // Valores controlables desde UI (se inicializan con CONFIG)
  let userGain = CONFIG.DEFAULT_GAIN;
  let userSmooth = CONFIG.DEFAULT_SMOOTH;
  gainCtl.value = CONFIG.DEFAULT_GAIN;
  smoothCtl.value = CONFIG.DEFAULT_SMOOTH;

  // Cuando el usuario mueve sliders, actualizamos
  gainCtl.oninput = e => { userGain = parseFloat(e.target.value); };
  smoothCtl.oninput = e => { userSmooth = parseFloat(e.target.value); if(analyser) analyser.smoothingTimeConstant=userSmooth; };

  function ensureAC(){
    if(ac) return;
    ac=new (window.AudioContext||window.webkitAudioContext)();

    // Buses / Gains
    masterGain     = ac.createGain(); masterGain.gain.value = 1;          // salida audible
    analysisMix    = ac.createGain(); analysisMix.gain.value = 1;         // mezcla para visualizador
    fileGain       = ac.createGain(); fileGain.gain.value = 1;            // ganancia de pista
    micGain        = ac.createGain(); micGain.gain.value  = 1;            // mic (solo análisis por defecto)
    micMonitorGain = ac.createGain(); micMonitorGain.gain.value = 0;      // monitor opcional del mic

    // Analyser (FFT)
    analyser = ac.createAnalyser();
    analyser.fftSize = CONFIG.FFT_SIZE;                                    // tomado de CONFIG
    analyser.smoothingTimeConstant = userSmooth;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    // Cableado general:
    // Pista → audible (master) + análisis
    fileGain.connect(masterGain);
    fileGain.connect(analysisMix);
    // Mic → análisis (si marcan monitor, también a master)
    micGain.connect(analysisMix);
    micGain.connect(micMonitorGain);
    micMonitorGain.connect(masterGain);

    // Salidas finales
    analysisMix.connect(analyser);
    masterGain.connect(ac.destination);
  }

  function startDraw(){ if(!rafId) draw(); }

  // ======== Mic ON/OFF (no audible por defecto) ========
  micToggle.addEventListener('click', async ()=>{
    ensureAC();
    if(micActive){
      // Apagar mic
      try{ if(micStream){ micStream.getTracks().forEach(t=>t.stop()); } }catch{}
      micStream=null;
      if(micSrc){ try{ micSrc.disconnect(); }catch{} micSrc=null; }
      micActive=false;
      micToggle.textContent='🎙️ Mic: OFF';
      return;
    }
    // Encender mic
    try{
      micStream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}
      });
      micSrc = ac.createMediaStreamSource(micStream);
      micSrc.connect(micGain); // solo al análisis
      micActive=true;
      micToggle.textContent='🎙️ Mic: ON';
      startDraw();
    }catch(err){
      alert('Micrófono no disponible: '+err.message);
    }
  });

  // Marcar/desmarcar para ESCUCHAR el mic (opcional)
  micMonitor.addEventListener('change', e=>{
    if(!ac) return;
    micMonitorGain.gain.value = e.target.checked ? 1 : 0;
  });

  // ======== Sprites (carga de imágenes) ========
  const sprites=[];
  fileSprites.onchange=async e=>{
    sprites.length=0;
    for(const f of e.target.files){
      const url=URL.createObjectURL(f);
      await new Promise(res=>{
        const img=new Image(); img.onload=()=>{sprites.push({img,w:img.width,h:img.height});res();}; img.src=url;
      });
    }
  };

  // ======== Mini reproductor (UI y metadatos) ========
  const mini = document.getElementById('miniPlayer');
  const miniHeader = document.getElementById('miniHeader');
  const cover = document.getElementById('cover');
  const titleEl = document.getElementById('title');
  const artistEl= document.getElementById('artist');
  const playBtn  = document.getElementById('play');
  const muteBtn  = document.getElementById('mute');
  const vol      = document.getElementById('volume');
  const prog     = document.getElementById('progress');
  const curT     = document.getElementById('cur');
  const durT     = document.getElementById('dur');
  const minToggle= document.getElementById('minToggle');

  let prevVol = 1;

  fileAudio.onchange = async e=>{
    const f=e.target.files?.[0]; if(!f) return;
    ensureAC();

    if(!audioEl){
      audioEl=new Audio();
      audioEl.crossOrigin='anonymous';
      audioEl.addEventListener('timeupdate',syncProgress);
      audioEl.addEventListener('ended',()=>playBtn.textContent='⏵');
    }
    audioEl.src = URL.createObjectURL(f);

    // IMPORTANTE: MediaElementSourceNode se crea una sola vez por <audio>
    if(!fileSrc){
      fileSrc = ac.createMediaElementSource(audioEl);
      fileSrc.connect(fileGain);
    }

    await audioEl.play().catch(()=>{});
    playBtn.textContent='⏸';

    // UI y metadatos
    mini.style.display='block';
    setTitleFromFile(f.name);
    cover.src=''; cover.alt='';
    parseID3(f).then(meta=>{
      if(meta.title) titleEl.textContent=meta.title;
      if(meta.artist) artistEl.textContent=meta.artist;
      if(meta.pictureURL){ cover.src=meta.pictureURL; cover.alt='Cover'; }
    }).catch(()=>{});

    vol.value=masterGain.gain.value;
    startDraw();
  };

  // Controles del reproductor
  playBtn.onclick = ()=>{ if(!audioEl) return; if(audioEl.paused){ audioEl.play(); playBtn.textContent='⏸'; } else { audioEl.pause(); playBtn.textContent='⏵'; } };
  vol.oninput     = e => { ensureAC(); masterGain.gain.value=parseFloat(e.target.value); prevVol=masterGain.gain.value||1; };
  muteBtn.onclick = ()=> { ensureAC(); if(masterGain.gain.value>0){ prevVol = masterGain.gain.value; masterGain.gain.value=0; muteBtn.textContent='🔈'; } else { masterGain.gain.value=prevVol||1; muteBtn.textContent='🔇'; } };
  prog.oninput    = e => { if(!audioEl||!audioEl.duration) return; const p=parseInt(e.target.value,10)/1000; audioEl.currentTime=audioEl.duration*p; };
  minToggle.onclick=()=> mini.classList.toggle('minimized');

  // Progreso y tiempos del reproductor
  function syncProgress(){
    if(!audioEl) return;
    const d=audioEl.duration||0, t=audioEl.currentTime||0;
    prog.value = d? Math.floor((t/d)*1000) : 0;
    curT.textContent = fmtTime(t);
    durT.textContent = fmtTime(d);
    requestAnimationFrame(syncProgress);
  }
  function fmtTime(s){ if(!isFinite(s)) return '0:00'; const m=Math.floor(s/60), ss=Math.floor(s%60); return m+':'+String(ss).padStart(2,'0'); }
  function setTitleFromFile(name){ titleEl.textContent=name.replace(/\.[^.]+$/,''); artistEl.textContent='—'; }

  // Arrastrar el mini reproductor por la pantalla
  (function enableDrag(){
    let ox=0, oy=0, dragging=false;
    const onDown=(e)=>{ dragging=true; const r=mini.getBoundingClientRect(); ox=(e.touches?e.touches[0].clientX:e.clientX)-r.left; oy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; e.preventDefault(); };
    const onMove=(e)=>{ if(!dragging) return; const x=(e.touches?e.touches[0].clientX:e.clientX)-ox; const y=(e.touches?e.touches[0].clientY:e.clientY)-oy;
      const maxX=window.innerWidth-mini.offsetWidth, maxY=window.innerHeight-mini.offsetHeight;
      mini.style.left=Math.max(4,Math.min(x,maxX-4))+'px'; mini.style.top=Math.max(4,Math.min(y,maxY-4))+'px'; mini.style.right='auto'; mini.style.bottom='auto';
    };
    const onUp=()=>dragging=false;
    miniHeader.addEventListener('mousedown',onDown);
    miniHeader.addEventListener('touchstart',onDown,{passive:false});
    window.addEventListener('mousemove',onMove,{passive:false});
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('mouseup',onUp);
    window.addEventListener('touchend',onUp);
  })();

  // ======== DIBUJO PRINCIPAL (usa CONFIG) ========
  // Historial para beat (se usa sólo en bajos)
  const beatHist = [];

  function draw(){
    rafId=requestAnimationFrame(draw);
    if(!analyser) return;
    analyser.getByteFrequencyData(dataArray);

    const W=canvas.clientWidth, H=canvas.clientHeight;

    // Fondo: sólido o con “rastro” translúcido
    if (CONFIG.USE_GRADIENT_BG) {
      g.fillStyle=`rgba(${hex2rgb(CONFIG.BACKGROUND_COLOR)},${CONFIG.TRAIL_ALPHA})`;
    } else {
      g.fillStyle=CONFIG.BACKGROUND_COLOR;
    }
    g.fillRect(0,0,W,H);

    // Reducimos a BINS bandas (más legible)
    const bins = CONFIG.BINS;
    const step=Math.floor(dataArray.length/bins);
    const bands=new Array(bins).fill(0).map((_,i)=>{
      let s=0; for(let j=0;j<step;j++) s+=dataArray[i*step+j]||0;
      return (s/step)/255*userGain;
    });

    // Detección de beat en banda baja
    const bassN = Math.max(1, Math.min(CONFIG.BEAT_BASS_BANDS, bands.length));
    const bass = bands.slice(1, bassN).reduce((a,b)=>a+b,0)/bassN;
    const beat = isBeat(bass);

    // Render según modo
    const mode=modeSel.value;
    if(mode==='bars') drawBars(bands,beat,W,H);
    else if(mode==='ring') drawRing(bands,beat,W,H);
    else drawSprites(bands,beat,W,H);
  }

  // Barras verticales
  function drawBars(bands, beat, W, H){
    const n=bands.length, gap=CONFIG.BARS_GAP_PX, bw=(W-(n+1)*gap)/n;
    for(let i=0;i<n;i++){
      const v=Math.min(1,bands[i]), h=v*(H*0.9), x=gap+i*(bw+gap), y=H-h;
      const hue=CONFIG.HUE_BASE + i*CONFIG.HUE_SPREAD;
      const sat= beat ? CONFIG.SAT_BEAT : CONFIG.SAT_NORMAL;
      const lig= beat ? CONFIG.LIGHT_BEAT : CONFIG.LIGHT_NORMAL;
      g.fillStyle=`hsl(${hue}, ${sat}%, ${lig}%)`;
      g.fillRect(x,y,bw,h);
      if (CONFIG.BARS_TOP_HIGHLIGHT) {
        g.fillStyle='rgba(255,255,255,0.08)'; g.fillRect(x,y,bw,6);
      }
    }
  }

  // Anillo circular
  function drawRing(bands, beat, W, H){
    const cx=W/2, cy=H/2;
    const rBase=Math.min(W,H)*CONFIG.RING_BASE_RATIO;
    const n=bands.length, TAU=Math.PI*2;
    g.save(); g.translate(cx,cy);
    for(let i=0;i<n;i++){
      const v=Math.min(1,bands[i]);
      const a0=(i/n)*TAU, a1=((i+1)/n)*TAU;
      const r = rBase + v*(Math.min(W,H)*CONFIG.RING_MAX_EXTRA);
      const hue=CONFIG.HUE_BASE + i*CONFIG.HUE_SPREAD;
      const sat= beat ? CONFIG.SAT_BEAT : CONFIG.SAT_NORMAL;
      const lig= beat ? CONFIG.LIGHT_BEAT : CONFIG.LIGHT_NORMAL;
      g.strokeStyle=`hsla(${hue},${sat}%,${lig}%,0.9)`;
      g.lineWidth=CONFIG.RING_LINE_MIN + v*(CONFIG.RING_LINE_MAX - CONFIG.RING_LINE_MIN);
      g.beginPath(); g.arc(0,0,r,a0,a1); g.stroke();
    }
    // Flash central cuando hay beat
    if (CONFIG.RING_BEAT_FLASH && beat){
      const grd=g.createRadialGradient(0,0,0,0,0,rBase*1.1);
      grd.addColorStop(0,`rgba(255,255,255,${CONFIG.RING_FLASH_STRENGTH})`);
      grd.addColorStop(1,'rgba(255,255,255,0)');
      g.fillStyle=grd; g.beginPath(); g.arc(0,0,rBase*1.1,0,TAU); g.fill();
    }
    g.restore();
  }

  // Sprites en rejilla/anillo/ola
  function drawSprites(bands, beat, W, H){
    g.imageSmoothingEnabled=false; // pixel art nítido
    // Ajustes que también se pueden cambiar en tiempo real desde los sliders de la UI
    const cols = +densityCtl.value || CONFIG.SPRITES_COLUMNS;
    const rows = Math.ceil(cols * (H/W));
    const cellW=W/cols, cellH=H/rows;

    // Reagrupar BINS a unas pocas “macrobandas” que controlan sprites
    const take = CONFIG.SPRITES_TAKE_BANDS;
    const chunk = Math.floor(bands.length/take);
    const band16=new Array(take).fill(0).map((_,i)=>{let s=0; for(let j=0;j<chunk;j++) s+=bands[i*chunk+j]; return s/chunk;});

    const maxScale=parseFloat(maxScaleCtl.value) || CONFIG.SPRITES_MAX_SCALE;
    const t=(performance.now()/1000) * CONFIG.SPEED_MULT;
    const pattern= patternSel.value || CONFIG.SPRITES_PATTERN;

    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const x=c*cellW, y=r*cellH;
        const idx=(r*cols+c)%band16.length;
        const v=Math.min(1,band16[idx]);

        const spr=sprites.length?sprites[(r+c)%sprites.length]:null;

        // Escala en función de la energía de la banda
        let s=1+v*(maxScale-1);

        // Variaciones según patrón
        if(pattern==='ring'){
          const cx=W/2,cy=H/2,dx=(x+cellW/2)-cx,dy=(y+cellH/2)-cy;
          const dist=Math.hypot(dx,dy)/Math.hypot(W/2,H/2);
          s*=0.7+0.6*Math.max(0,1-dist*1.3);
        }else if(pattern==='wave'){
          s*=0.8+0.4*Math.sin((c/cols)*Math.PI*2 + t*CONFIG.SPRITES_WAVE_SPEED + r*0.3);
        }

        // Dibujo
        if(spr){
          const dw=spr.w*s, dh=spr.h*s;
          const ox=x+(cellW-dw)/2, oy=y+(cellH-dh)/2;
          if(beat){ g.fillStyle='rgba(255,255,255,0.06)'; g.fillRect(x,y,cellW,cellH); }
          g.drawImage(spr.img, ox, oy, dw, dh);
        }else{
          // Placeholder si no hay sprites cargados
          g.fillStyle=beat?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.03)';
          g.fillRect(x,y,cellW,cellH);
          g.fillStyle='rgba(255,255,255,0.06)';
          const m=Math.min(cellW,cellH)*0.4*s;
          g.fillRect(x+(cellW-m)/2, y+(cellH-m)/2, m, m);
        }
      }
    }
  }

  // === Beat detector con umbral adaptativo (usa CONFIG.*) ===
  function isBeat(bassVal){
    const hist=beatHist, maxH=CONFIG.BEAT_HISTORY_FRAMES;
    hist.push(bassVal); if(hist.length>maxH) hist.shift();
    const avg=hist.reduce((a,b)=>a+b,0)/hist.length;
    const thr=avg*CONFIG.BEAT_FACTOR + CONFIG.BEAT_OFFSET;
    return bassVal>thr;
  }

  // === Utilidades ===
  function hex2rgb(hex){
    const h = hex.replace('#','');
    const bigint = parseInt(h,16);
    const r = (bigint>>16)&255, g=(bigint>>8)&255, b=bigint&255;
    return `${r},${g},${b}`;
  }

  // ======== ID3 mínimo (título/artista/cover) ========
  async function parseID3(file){
    const slice = file.slice(0, 512*1024);
    const buf = await slice.arrayBuffer();
    const dv = new DataView(buf);
    if (String.fromCharCode(dv.getUint8(0),dv.getUint8(1),dv.getUint8(2)) !== 'ID3') return {};
    const version = dv.getUint8(3);
    const flags = dv.getUint8(5);
    const size = synchsafeToInt(dv.getUint8(6),dv.getUint8(7),dv.getUint8(8),dv.getUint8(9));
    let offset = 10;
    if (flags & 0x40) {
      const extSize = version===4
        ? synchsafeToInt(dv.getUint8(10),dv.getUint8(11),dv.getUint8(12),dv.getUint8(13))
        : dv.getUint32(10);
      offset += extSize;
    }
    let title='', artist='', pictureURL='';
    while (offset + 10 < dv.byteLength && offset < size){
      const id = String.fromCharCode(dv.getUint8(offset),dv.getUint8(offset+1),dv.getUint8(offset+2),dv.getUint8(offset+3));
      const fsize = version===4
        ? synchsafeToInt(dv.getUint8(offset+4),dv.getUint8(offset+5),dv.getUint8(offset+6),dv.getUint8(offset+7))
        : dv.getUint32(offset+4);
      const fstart = offset+10;
      if (id==='TIT2' || id==='TPE1'){
        const enc = dv.getUint8(fstart);
        let text='';
        if (enc===0){ text = new TextDecoder('latin1').decode(new DataView(buf,fstart+1,fsize-1)); }
        else if (enc===3){ text = new TextDecoder('utf-8').decode(new DataView(buf,fstart+1,fsize-1)); }
        else { text = new TextDecoder('utf-16').decode(new DataView(buf,fstart+1,fsize-1)); }
        text = text.replace(/\0/g,'');
        if (id==='TIT2') title=text;
        if (id==='TPE1') artist=text;
      } else if (id==='APIC' && !pictureURL){
        let p=fstart+1; while (p<fstart+fsize && dv.getUint8(p)!==0) p++;
        const mime = new TextDecoder('utf-8').decode(new DataView(buf, fstart+1, p-(fstart+1)));
        const picType = dv.getUint8(++p);
        let q=p+1; while (q<fstart+fsize && dv.getUint8(q)!==0) q++;
        const imgStart = q+1;
        const img = new Blob([new DataView(buf, imgStart, fstart+fsize-imgStart)], {type: mime || 'image/jpeg'});
        pictureURL = URL.createObjectURL(img);
      }
      offset += 10 + fsize;
    }
    return {title, artist, pictureURL};
    function synchsafeToInt(a,b,c,d){ return ((a&0x7f)<<21)|((b&0x7f)<<14)|((c&0x7f)<<7)|(d&0x7f); }
  }
})();
